apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "customer-gateway.fullname" . }}{{ if .Values.blueGreen.enabled }}-{{ .Values.blueGreen.environment }}{{ end }}
  labels:
    {{- include "customer-gateway.labels" . | nindent 4 }}
    {{- if .Values.blueGreen.enabled }}
    environment: {{ .Values.blueGreen.environment }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "customer-gateway.selectorLabels" . | nindent 6 }}
      {{- if .Values.blueGreen.enabled }}
      environment: {{ .Values.blueGreen.environment }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- include "customer-gateway.selectorLabels" . | nindent 8 }}
        {{- if .Values.blueGreen.enabled }}
        environment: {{ .Values.blueGreen.environment }}
        {{- end }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        {{- toYaml .Values.env | nindent 8 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health  
            port: http
          initialDelaySeconds: 60
          periodSeconds: 15