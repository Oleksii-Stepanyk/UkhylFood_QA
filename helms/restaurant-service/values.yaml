replicaCount: 1

image:
  repository: restaurant-service
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Development"
  - name: RabbitMQ__HostName
    value: "rabbitmq"
  - name: ConnectionStrings__RestaurantServiceDb
    value: "Server=team2-restaurant-db;Database=restaurant_db;Username=restaurant_user;Password=restaurant_pass;"
  - name: RabbitMQ__Host
    value: "amqp://guest:guest@rabbitmq:5672"
  - name: OTLP_ENDPOINT_URL
    value: "http://jaeger-collector:4317"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
