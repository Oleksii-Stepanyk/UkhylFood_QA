apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "restaurant-service.fullname" . }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      {{- include "restaurant-service.labels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
